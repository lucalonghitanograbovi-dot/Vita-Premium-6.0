<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Vita Premium 6.0 - Video & Audio Editor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="editor-container">
    <!-- Panel de Efectos Organizado -->
    <div class="panel sidebar">
      <h2>Añadir Efecto</h2>
      <input type="file" id="videoInput" accept="video/*">
      
      <div class="add-effect-box">
        <label for="effectSelect">Seleccionar Efecto:</label>
        <select id="effectSelect">
          <option value="sepia">Sepia</option>
          <option value="invert">Invertir Colores</option>
          <option value="blur">Desenfoque (Blur)</option>
          <option value="saturate">Saturación Extra</option>
          <option value="hue">Hue (Rotación de Color)</option>
          <option value="fisheye">Ojo de Pez</option>
          <option value="swirl">Remolino</option>
        </select>
      </div>

      <h2>Controles Activos</h2>
      <div class="controls" id="controlsContainer">
        <!-- Acá se cargarán los sliders según el efecto seleccionado -->
        <div class="effect-control">
          <label>Sepia:</label>
          <input type="range" id="sepiaSlider" min="0" max="100" value="0">
        </div>
        <div class="effect-control">
          <label>Invertir Colores:</label>
          <input type="range" id="invertSlider" min="0" max="100" value="0">
        </div>
        <div class="effect-control">
          <label>Desenfoque (Blur):</label>
          <input type="range" id="blurSlider" min="0" max="10" value="0">
        </div>
        <div class="effect-control">
          <label>Saturación:</label>
          <input type="range" id="satSlider" min="0" max="500" value="100">
        </div>
        <div class="effect-control">
          <label>Hue (Color):</label>
          <input type="range" id="hueSlider" min="0" max="360" value="0">
        </div>
        <div class="effect-control">
          <label>Ojo de Pez:</label>
          <input type="range" id="fisheyeSlider" min="100" max="200" value="100">
        </div>
        <div class="effect-control">
          <label>Remolino:</label>
          <input type="range" id="swirlSlider" min="-180" max="180" value="0">
        </div>
      </div>
    </div>

    <!-- Panel de Previsualización -->
    <div class="panel preview">
      <h2>Previsualización</h2>
      <div class="video-wrapper" id="videoWrapper">
        <video id="videoPreview" controls></video>
      </div>
    </div>
  </div>

  <!-- Panel de Timeline y Semitonos -->
  <div class="timeline">
    <h3>Línea de Tiempo y Tono de Audio (Pitch Semitones)</h3>
    
    <div class="track">
      <span>Track 1 Audio (Semitonos: <b id="val1">0</b>)</span>
      <input type="range" class="pitch-slider" id="pitch1" min="-12" max="12" value="0">
    </div>

    <div class="track">
      <span>Track 2 Audio (Semitonos: <b id="val2">0</b>)</span>
      <input type="range" class="pitch-slider" id="pitch2" min="-12" max="12" value="0">
    </div>

    <div class="track">
      <span>Track 3 Audio (Semitonos: <b id="val3">0</b>)</span>
      <input type="range" class="pitch-slider" id="pitch3" min="-12" max="12" value="0">
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
