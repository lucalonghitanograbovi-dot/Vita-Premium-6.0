<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Vita Premium 6.0 - Video & Audio Editor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="editor-container">
    <!-- Panel de Efectos -->
    <div class="panel sidebar">
      <h2>Efectos de Video</h2>
      <input type="file" id="videoInput" accept="video/*">
      
      <div class="controls">
        <label>Sepia:</label>
        <input type="range" id="sepiaSlider" min="0" max="100" value="0">

        <label>Invertir Colores:</label>
        <input type="range" id="invertSlider" min="0" max="100" value="0">

        <label>Desenfoque (Blur):</label>
        <input type="range" id="blurSlider" min="0" max="10" value="0">

        <label>Ojo de Pez (Zoom Curvo):</label>
        <input type="range" id="fisheyeSlider" min="100" max="200" value="100">

        <label>Remolino (Rotación):</label>
        <input type="range" id="swirlSlider" min="-180" max="180" value="0">
      </div>
    </div>

    <!-- Panel de Previsualización -->
    <div class="panel preview">
      <h2>Previsualización</h2>
      <div class="video-wrapper" id="videoWrapper">
        <video id="videoPreview" controls></video>
      </div>
    </div>
  </div>

  <!-- Panel de Timeline y Semitonos -->
  <div class="timeline">
    <h3>Línea de Tiempo y Tono de Audio (Semitones)</h3>
    
    <div class="track">
      <span>Track 1 Audio (Semitonos: <b id="val1">0</b>)</span>
      <input type="range" class="pitch-slider" id="pitch1" min="-12" max="12" value="0">
    </div>

    <div class="track">
      <span>Track 2 Audio (Semitonos: <b id="val2">0</b>)</span>
      <input type="range" class="pitch-slider" id="pitch2" min="-12" max="12" value="0">
    </div>

    <div class="track">
      <span>Track 3 Audio (Semitonos: <b id="val3">0</b>)</span>
      <input type="range" class="pitch-slider" id="pitch3" min="-12" max="12" value="0">
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
