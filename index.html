<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Vita Premium 6.0 - Video & Audio Editor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="editor-container">
    <!-- Panel de Efectos Organizado -->
    <div class="panel sidebar">
      <h2>Efectos (Vegas Pro FX)</h2>
      <input type="file" id="videoInput" accept="video/*">
      
      <div class="controls" id="controlsContainer">

        <div class="effect-control">
          <label>Gradient Map (Degradado):</label>
          <input type="range" id="gradientSlider" min="0" max="100" value="0">
        </div>

        <div class="effect-control">
          <label>Wave (Ondulación / Deformación):</label>
          <input type="range" id="waveSlider" min="0" max="50" value="0">
        </div>

        <div class="effect-control">
          <label>Saturación:</label>
          <input type="range" id="satSlider" min="0" max="500" value="100">
        </div>

        <div class="effect-control">
          <label>Hue (Color / Tono):</label>
          <input type="range" id="hueSlider" min="0" max="360" value="0">
        </div>

        <div class="effect-control">
          <label>Ojo de Pez (Zoom Curvo):</label>
          <input type="range" id="fisheyeSlider" min="100" max="200" value="100">
        </div>

        <div class="effect-control">
          <label>Remolino (Rotación):</label>
          <input type="range" id="swirlSlider" min="-180" max="180" value="0">
        </div>

        <div class="effect-control">
          <label>Sepia:</label>
          <input type="range" id="sepiaSlider" min="0" max="100" value="0">
        </div>

        <div class="effect-control">
          <label>Desenfoque (Blur):</label>
          <input type="range" id="blurSlider" min="0" max="10" value="0">
        </div>

      </div>
    </div>

    <!-- Panel de Previsualización -->
    <div class="panel preview">
      <h2>Previsualización</h2>
      <div class="video-wrapper" id="videoWrapper">
        <video id="videoPreview" controls crossOrigin="anonymous"></video>
      </div>
    </div>
  </div>

  <!-- Panel de Timeline y Semitonos -->
  <div class="timeline">
    <h3>Línea de Tiempo y Tono de Audio (Semitones en Velocidad 1x)</h3>
    
    <div class="track">
      <span>Track 1 Audio (Semitonos: <b id="val1">0</b>)</span>
      <input type="range" class="pitch-slider" id="pitch1" min="-12" max="12" value="0">
    </div>

    <div class="track">
      <span>Track 2 Audio (Semitonos: <b id="val2">0</b>)</span>
      <input type="range" class="pitch-slider" id="pitch2" min="-12" max="12" value="0">
    </div>

    <div class="track">
      <span>Track 3 Audio (Semitonos: <b id="val3">0</b>)</span>
      <input type="range" class="pitch-slider" id="pitch3" min="-12" max="12" value="0">
    </div>
  </div>

  <!-- Filtro SVG para efecto Wave de Vegas Pro -->
  <svg style="display: none;">
    <defs>
      <filter id="waveFilter">
        <feTurbulence type="fractalNoise" baseFrequency="0.02 0.05" numOctaves="2" result="noise" id="feTurbulence"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="0" xChannelSelector="R" yChannelSelector="G" id="feDisplacement"/>
      </filter>
    </defs>
  </svg>

  <script src="script.js"></script>
</body>
</html>
